<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西洋占星術 ホロスコープ鑑定</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #c9a84c;
  --accent-dim: rgba(201,168,76,0.15);
  --fire: #e74c3c;
  --earth: #27ae60;
  --air: #3498db;
  --water: #9b59b6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* Header */
header {
  text-align: center;
  padding: 48px 24px 32px;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 8px;
}
header p {
  font-size: 16px;
  color: var(--text-dim);
}

/* Form */
.input-section {
  max-width: 640px;
  margin: 40px auto;
  padding: 0 24px;
}
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.form-row.single { grid-template-columns: 1fr; }
.form-group label {
  display: block;
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}
.form-hint {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 4px;
}
.btn-cast {
  display: block;
  width: 100%;
  margin-top: 24px;
  padding: 14px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: opacity 0.2s;
}
.btn-cast:hover { opacity: 0.85; }

/* Results */
#results { display: none; }
.results-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.result-header {
  text-align: center;
  margin-bottom: 40px;
}
.result-header h2 {
  font-size: 22px;
  font-weight: 400;
  color: var(--accent);
  margin-bottom: 8px;
}
.result-header .meta {
  font-size: 16px;
  color: var(--text-dim);
}

/* Chart area */
.chart-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-bottom: 48px;
  align-items: start;
}
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
}
.chart-container h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 400;
}
.chart-container svg {
  width: 100%;
  height: auto;
  max-width: 480px;
}

/* Planet list */
.planet-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}
.planet-list h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 400;
}
.planet-row {
  display: grid;
  grid-template-columns: 36px 1fr 100px 80px;
  gap: 8px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
}
.planet-row:last-child { border-bottom: none; }
.planet-icon { font-size: 20px; text-align: center; }
.planet-name { font-weight: 500; }
.planet-sign { color: var(--accent); }
.planet-deg { color: var(--text-dim); font-size: 14px; }

/* Summary card */
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 32px;
}
.summary-card h3 {
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 400;
}
.summary-card p {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 12px;
}

/* Three cores */
.three-cores {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}
.core-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}
.core-card .core-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.core-card .core-sign {
  font-size: 22px;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 8px;
}
.core-card .core-desc {
  font-size: 16px;
  line-height: 1.7;
}

/* Aspect table */
.aspect-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 32px;
}
.aspect-section h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 400;
}
.aspect-row {
  display: grid;
  grid-template-columns: 1fr 80px 1fr 60px;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
}
.aspect-row:last-child { border-bottom: none; }
.aspect-type { text-align: center; font-weight: 500; }
.aspect-orb { text-align: center; color: var(--text-dim); font-size: 14px; }

/* Element balance */
.element-section {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}
.element-card {
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid var(--border);
}
.element-card.fire { background: rgba(231,76,60,0.1); border-color: var(--fire); }
.element-card.earth { background: rgba(39,174,96,0.1); border-color: var(--earth); }
.element-card.air { background: rgba(52,152,219,0.1); border-color: var(--air); }
.element-card.water { background: rgba(155,89,182,0.1); border-color: var(--water); }
.element-card .el-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.element-card .el-count { font-size: 28px; font-weight: 700; color: var(--accent); }
.element-card .el-planets { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

/* House section */
.house-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 32px;
}
.house-section h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 16px;
  font-weight: 400;
}
.house-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.house-item {
  padding: 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 16px;
}
.house-item .house-num {
  font-weight: 700;
  color: var(--accent);
  margin-right: 8px;
}
.house-item .house-sign { color: var(--text); }
.house-item .house-theme {
  display: block;
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Reading sections */
.reading-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
}
.reading-section h3 {
  font-size: 18px;
  color: var(--accent);
  margin-bottom: 12px;
  font-weight: 400;
}
.reading-section h4 {
  font-size: 16px;
  color: var(--text);
  margin: 16px 0 8px;
  font-weight: 500;
}
.reading-section p {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 8px;
}

/* Responsive */
@media (max-width: 768px) {
  .chart-section { grid-template-columns: 1fr; }
  .three-cores { grid-template-columns: 1fr; }
  .element-section { grid-template-columns: repeat(2, 1fr); }
  .house-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  header { padding: 32px 16px 24px; }
  header h1 { font-size: 22px; }
  .input-section { padding: 0 16px; margin: 24px auto; }
  .form-card { padding: 20px; }
  .results-wrap { padding: 24px 16px 60px; }
  .summary-card { padding: 20px; }
  .core-card { padding: 16px; }
  .core-card .core-sign { font-size: 18px; }
  .planet-row { grid-template-columns: 32px 1fr 90px 70px; font-size: 14px; }
  .aspect-row { grid-template-columns: 1fr 60px 1fr 50px; font-size: 14px; }
}
@media (max-width: 480px) {
  .element-section { grid-template-columns: 1fr 1fr; }
  .house-grid { grid-template-columns: 1fr; }
  header h1 { font-size: 20px; letter-spacing: 0.08em; }
  .planet-row { grid-template-columns: 28px 1fr 80px; font-size: 13px; }
  .planet-row .planet-deg { display: none; }
  .aspect-row { grid-template-columns: 1fr 50px 1fr; font-size: 13px; }
  .aspect-row .aspect-orb { display: none; }
}
</style>
</head>

<script>

// ============================================================
// Constants
// ============================================================
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;

const SIGNS = [
  { name: '牡羊座', symbol: '♈', en: 'Aries', element: 'fire', quality: 'cardinal' },
  { name: '牡牛座', symbol: '♉', en: 'Taurus', element: 'earth', quality: 'fixed' },
  { name: '双子座', symbol: '♊', en: 'Gemini', element: 'air', quality: 'mutable' },
  { name: '蟹座',   symbol: '♋', en: 'Cancer', element: 'water', quality: 'cardinal' },
  { name: '獅子座', symbol: '♌', en: 'Leo', element: 'fire', quality: 'fixed' },
  { name: '乙女座', symbol: '♍', en: 'Virgo', element: 'earth', quality: 'mutable' },
  { name: '天秤座', symbol: '♎', en: 'Libra', element: 'air', quality: 'cardinal' },
  { name: '蠍座',   symbol: '♏', en: 'Scorpio', element: 'water', quality: 'fixed' },
  { name: '射手座', symbol: '♐', en: 'Sagittarius', element: 'fire', quality: 'mutable' },
  { name: '山羊座', symbol: '♑', en: 'Capricorn', element: 'earth', quality: 'cardinal' },
  { name: '水瓶座', symbol: '♒', en: 'Aquarius', element: 'air', quality: 'fixed' },
  { name: '魚座',   symbol: '♓', en: 'Pisces', element: 'water', quality: 'mutable' },
];

const PLANETS = [
  { id: 'sun',     name: '太陽',   symbol: '☉', icon: '☀️' },
  { id: 'moon',    name: '月',     symbol: '☽', icon: '🌙' },
  { id: 'mercury', name: '水星',   symbol: '☿', icon: '☿️' },
  { id: 'venus',   name: '金星',   symbol: '♀', icon: '♀️' },
  { id: 'mars',    name: '火星',   symbol: '♂', icon: '♂️' },
  { id: 'jupiter', name: '木星',   symbol: '♃', icon: '♃' },
  { id: 'saturn',  name: '土星',   symbol: '♄', icon: '♄' },
  { id: 'uranus',  name: '天王星', symbol: '♅', icon: '⛢' },
  { id: 'neptune', name: '海王星', symbol: '♆', icon: '♆' },
  { id: 'pluto',   name: '冥王星', symbol: '♇', icon: '♇' },
];

const ASPECT_DEFS = [
  { name: '合',   angle: 0,   orb: 8, symbol: '☌', color: '#c9a84c' },
  { name: '六分', angle: 60,  orb: 5, symbol: '⚹', color: '#27ae60' },
  { name: '四分', angle: 90,  orb: 7, symbol: '□', color: '#e74c3c' },
  { name: '三分', angle: 120, orb: 7, symbol: '△', color: '#3498db' },
  { name: '衝',   angle: 180, orb: 8, symbol: '☍', color: '#9b59b6' },
];

const HOUSE_THEMES = [
  '自己・外見・第一印象',
  '財産・価値観・所有',
  'コミュニケーション・学習・兄弟',
  '家庭・ルーツ・心の基盤',
  '創造性・恋愛・子供・遊び',
  '健康・日常・奉仕',
  'パートナーシップ・結婚・契約',
  '変容・遺産・深い絆・性',
  '哲学・旅行・高等教育・信念',
  'キャリア・社会的地位・天職',
  '友人・コミュニティ・理想',
  '無意識・秘密・スピリチュアル',
];

// ============================================================
// Date/Time Utilities
// ============================================================
function toJulianDay(year, month, day, hour) {
  if (month <= 2) { year--; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716)) +
         Math.floor(30.6001 * (month + 1)) +
         day + hour / 24 + B - 1524.5;
}

function toJulianCentury(jd) {
  return (jd - 2451545.0) / 36525.0;
}

// ============================================================
// Simplified Planetary Position Calculations
// Mean longitude approximations (sufficient for natal chart interpretation)
// ============================================================
function calcSunLong(T) {
  const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
  const M = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
  const Mr = M * DEG;
  const C = (1.914602 - 0.004817 * T) * Math.sin(Mr) +
            (0.019993 - 0.000101 * T) * Math.sin(2 * Mr) +
            0.000289 * Math.sin(3 * Mr);
  return norm360(L0 + C);
}

function calcMoonLong(T) {
  const Lp = 218.3165 + 481267.8813 * T;
  const D  = 297.8502 + 445267.1115 * T;
  const M  = 357.5291 + 35999.0503 * T;
  const Mp = 134.9634 + 477198.8676 * T;
  const F  = 93.2720  + 483202.0175 * T;
  const lng = Lp
    + 6.289 * Math.sin(Mp * DEG)
    - 1.274 * Math.sin((2*D - Mp) * DEG)
    + 0.658 * Math.sin(2*D * DEG)
    - 0.214 * Math.sin(2*Mp * DEG)
    - 0.186 * Math.sin(M * DEG)
    - 0.114 * Math.sin(2*F * DEG)
    + 0.059 * Math.sin((2*D - 2*Mp) * DEG)
    + 0.057 * Math.sin((2*D - M - Mp) * DEG);
  return norm360(lng);
}

function calcPlanetLong(id, T) {
  // Simplified mean longitude + first-order perturbation
  const params = {
    mercury: { L: 252.2509 + 149472.6747 * T, a: 23.4400, p: 149472.5153 * T },
    venus:   { L: 181.9798 + 58517.8157 * T,  a: 0.7758, p: 58517.8039 * T },
    mars:    { L: 355.4330 + 19140.2993 * T,   a: 10.6912, p: 19139.8585 * T },
    jupiter: { L: 34.3515  + 3034.9057 * T,    a: 5.5549, p: 3034.6845 * T },
    saturn:  { L: 50.0774  + 1222.1138 * T,    a: 6.3585, p: 1222.1132 * T },
    uranus:  { L: 314.0550 + 428.9489 * T,     a: 5.3132, p: 428.4571 * T },
    neptune: { L: 304.3487 + 218.4862 * T,     a: 1.8496, p: 218.4602 * T },
    pluto:   { L: 238.9290 + 145.2078 * T,     a: 14.882, p: 144.9600 * T },
  };
  const p = params[id];
  if (!p) return 0;
  const M = p.p * DEG;
  return norm360(p.L + p.a * Math.sin(M));
}

function norm360(deg) {
  let d = deg % 360;
  if (d < 0) d += 360;
  return d;
}

// ============================================================
// Sidereal Time & House Cusps (Placidus simplified → Equal House from ASC)
// ============================================================
function calcGMST(jd) {
  const T = toJulianCentury(jd);
  let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) +
             0.000387933 * T * T - T * T * T / 38710000;
  return norm360(gmst);
}

function calcASC(jd, lat, lng) {
  const gmst = calcGMST(jd);
  const lst = norm360(gmst + lng);
  const obliquity = 23.4393 - 0.0130 * toJulianCentury(jd);
  const lstR = lst * DEG;
  const latR = lat * DEG;
  const oblR = obliquity * DEG;
  const y = -Math.cos(lstR);
  const x = Math.sin(oblR) * Math.tan(latR) + Math.cos(oblR) * Math.sin(lstR);
  let asc = Math.atan2(y, x) * RAD;
  asc = norm360(asc);
  return asc;
}

function calcMC(jd, lng) {
  const gmst = calcGMST(jd);
  const lst = norm360(gmst + lng);
  const obliquity = 23.4393 - 0.0130 * toJulianCentury(jd);
  const mc = Math.atan2(Math.sin(lst * DEG),
    Math.cos(lst * DEG) * Math.cos(obliquity * DEG)) * RAD;
  return norm360(mc);
}

function calcHouses(asc) {
  // Equal house system: each house = 30° from ASC
  const houses = [];
  for (let i = 0; i < 12; i++) {
    houses.push(norm360(asc + i * 30));
  }
  return houses;
}

// ============================================================
// Aspect Calculation
// ============================================================
function calcAspects(positions) {
  const aspects = [];
  const keys = Object.keys(positions);
  for (let i = 0; i < keys.length; i++) {
    for (let j = i + 1; j < keys.length; j++) {
      const a = positions[keys[i]];
      const b = positions[keys[j]];
      let diff = Math.abs(a - b);
      if (diff > 180) diff = 360 - diff;
      for (const asp of ASPECT_DEFS) {
        const orb = Math.abs(diff - asp.angle);
        if (orb <= asp.orb) {
          aspects.push({
            planet1: keys[i],
            planet2: keys[j],
            type: asp.name,
            symbol: asp.symbol,
            color: asp.color,
            angle: asp.angle,
            orb: orb.toFixed(1),
          });
          break;
        }
      }
    }
  }
  return aspects;
}

// ============================================================
// Sign Utilities
// ============================================================
function getSign(deg) {
  const idx = Math.floor(norm360(deg) / 30);
  return SIGNS[idx];
}

function getSignIndex(deg) {
  return Math.floor(norm360(deg) / 30);
}

function getDegInSign(deg) {
  return norm360(deg) % 30;
}

function formatDeg(deg) {
  const d = getDegInSign(deg);
  const degrees = Math.floor(d);
  const minutes = Math.floor((d - degrees) * 60);
  return `${degrees}°${String(minutes).padStart(2,'0')}'`;
}

function getHouse(deg, houses) {
  for (let i = 0; i < 12; i++) {
    const start = houses[i];
    const end = houses[(i + 1) % 12];
    if (start < end) {
      if (deg >= start && deg < end) return i + 1;
    } else {
      if (deg >= start || deg < end) return i + 1;
    }
  }
  return 1;
}

// ============================================================
// Main Calculation
// ============================================================
function calculateChart(year, month, day, hour, minute, lat, lng) {
  const utcHour = hour + minute / 60 - 9; // JST → UTC (rough; assumes JST input)
  const jd = toJulianDay(year, month, day, utcHour);
  const T = toJulianCentury(jd);

  const positions = {};
  positions.sun = calcSunLong(T);
  positions.moon = calcMoonLong(T);
  for (const p of ['mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto']) {
    positions[p] = calcPlanetLong(p, T);
  }

  const asc = calcASC(jd, lat, lng);
  const mc = calcMC(jd, lng);
  const houses = calcHouses(asc);

  const aspects = calcAspects(positions);

  return { positions, asc, mc, houses, aspects, jd, T };
}

// ============================================================
// SVG Chart Rendering
// ============================================================
function renderChart(data) {
  const { positions, asc, houses } = data;
  const size = 480;
  const cx = size / 2, cy = size / 2;
  const outerR = 220, signR = 190, innerR = 160, houseR = 60;

  // Chart is oriented so ASC is at the left (9 o'clock position)
  // Zodiac goes counter-clockwise from ASC
  let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${size}" height="${size}" fill="transparent"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${outerR}" fill="none" stroke="#30363d" stroke-width="1"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${signR}" fill="none" stroke="#30363d" stroke-width="1"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="none" stroke="#30363d" stroke-width="1"/>`;
  svg += `<circle cx="${cx}" cy="${cy}" r="${houseR}" fill="none" stroke="#30363d" stroke-width="0.5"/>`;

  // Helper: convert ecliptic longitude to chart angle (radians)
  // ASC is at 180° (left side), zodiac goes counter-clockwise
  function toChartAngle(eclLong) {
    return (asc - eclLong) * DEG + Math.PI;
  }

  // Sign divisions
  for (let i = 0; i < 12; i++) {
    const eclDeg = i * 30; // start of sign i (0=Aries 0°)
    const a = toChartAngle(eclDeg);
    svg += `<line x1="${cx + signR * Math.cos(a)}" y1="${cy - signR * Math.sin(a)}" x2="${cx + outerR * Math.cos(a)}" y2="${cy - outerR * Math.sin(a)}" stroke="#30363d" stroke-width="0.5"/>`;

    // Sign label at midpoint
    const midEcl = i * 30 + 15;
    const ma = toChartAngle(midEcl);
    const lr = (signR + outerR) / 2;
    svg += `<text x="${cx + lr * Math.cos(ma)}" y="${cy - lr * Math.sin(ma)}" text-anchor="middle" dominant-baseline="central" fill="#8b949e" font-size="15">${SIGNS[i].symbol}</text>`;
  }

  // House cusps (lines from center to inner ring)
  for (let i = 0; i < 12; i++) {
    const a = toChartAngle(houses[i]);
    const lineR = (i % 3 === 0) ? signR : innerR; // Angular houses get longer lines
    const sw = (i % 3 === 0) ? 1.5 : 0.5;
    svg += `<line x1="${cx + houseR * Math.cos(a)}" y1="${cy - houseR * Math.sin(a)}" x2="${cx + lineR * Math.cos(a)}" y2="${cy - lineR * Math.sin(a)}" stroke="${i % 3 === 0 ? '#c9a84c' : '#30363d'}" stroke-width="${sw}"/>`;

    // House number
    const nextH = houses[(i + 1) % 12];
    let midH = (houses[i] + nextH) / 2;
    if (Math.abs(houses[i] - nextH) > 180) midH = norm360(midH + 180);
    const ha = toChartAngle(midH);
    const hr = (houseR + innerR) / 2 - 10;
    svg += `<text x="${cx + hr * Math.cos(ha)}" y="${cy - hr * Math.sin(ha)}" text-anchor="middle" dominant-baseline="central" fill="#484f58" font-size="11">${i + 1}</text>`;
  }

  // ASC / MC labels
  const ascA = toChartAngle(asc);
  svg += `<text x="${cx + (outerR + 14) * Math.cos(ascA)}" y="${cy - (outerR + 14) * Math.sin(ascA)}" text-anchor="middle" dominant-baseline="central" fill="#c9a84c" font-size="12" font-weight="700">ASC</text>`;
  const mcA = toChartAngle(data.mc);
  svg += `<text x="${cx + (outerR + 14) * Math.cos(mcA)}" y="${cy - (outerR + 14) * Math.sin(mcA)}" text-anchor="middle" dominant-baseline="central" fill="#c9a84c" font-size="12" font-weight="700">MC</text>`;

  // Aspect lines
  for (const asp of data.aspects) {
    const a1 = toChartAngle(positions[asp.planet1]);
    const a2 = toChartAngle(positions[asp.planet2]);
    const r = innerR - 10;
    svg += `<line x1="${cx + r * Math.cos(a1)}" y1="${cy - r * Math.sin(a1)}" x2="${cx + r * Math.cos(a2)}" y2="${cy - r * Math.sin(a2)}" stroke="${asp.color}" stroke-width="0.7" opacity="0.4"/>`;
  }

  // Planets
  const planetR = (innerR + signR) / 2;
  const placed = [];
  for (const p of PLANETS) {
    let ecl = positions[p.id];
    let a = toChartAngle(ecl);
    // Simple collision avoidance
    let px = cx + planetR * Math.cos(a);
    let py = cy - planetR * Math.sin(a);
    for (const prev of placed) {
      const dist = Math.sqrt((px - prev.x) ** 2 + (py - prev.y) ** 2);
      if (dist < 18) {
        a += 0.12;
        px = cx + planetR * Math.cos(a);
        py = cy - planetR * Math.sin(a);
      }
    }
    placed.push({ x: px, y: py });

    // Dot on inner ring
    const dotA = toChartAngle(ecl);
    svg += `<circle cx="${cx + innerR * Math.cos(dotA)}" cy="${cy - innerR * Math.sin(dotA)}" r="2" fill="#c9a84c"/>`;

    // Planet circle + symbol
    svg += `<circle cx="${px}" cy="${py}" r="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>`;
    svg += `<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="central" fill="#e6edf3" font-size="13">${p.symbol}</text>`;
  }

  svg += `</svg>`;
  return svg;
}

    <div class="core-card">
      <div class="core-label">↑ 上昇点（ASC）— 第一印象</div>
      <div class="core-sign">${ascSign.symbol} ${ascSign.name}</div>
      <div class="core-desc">${ascData}</div>
    </div>`;
}

function renderElements(data) {
  const counts = { fire: [], earth: [], air: [], water: [] };
  for (const p of PLANETS) {
    const sign = getSign(data.positions[p.id]);
    counts[sign.element].push(p.name);
  }
  const labels = { fire: '🔥 火', earth: '🌿 地', air: '💨 風', water: '💧 水' };
  let html = '';
  for (const el of ['fire','earth','air','water']) {
    html += `<div class="element-card ${el}">
      <div class="el-name">${labels[el]}</div>
      <div class="el-count">${counts[el].length}</div>
      <div class="el-planets">${counts[el].join('・') || '—'}</div>
    </div>`;
  }
  return html;
}

function renderHouses(data) {
  let html = '<h3>12ハウス</h3><div class="house-grid">';
  for (let i = 0; i < 12; i++) {
    const sign = getSign(data.houses[i]);
    // Find planets in this house
    const planetsInHouse = PLANETS.filter(p => getHouse(data.positions[p.id], data.houses) === i + 1);
    const planetStr = planetsInHouse.map(p => p.symbol).join(' ');
    html += `<div class="house-item">
      <span class="house-num">${i + 1}室</span>
      <span class="house-sign">${sign.symbol} ${sign.name} ${formatDeg(data.houses[i])}</span>
      ${planetStr ? `<span style="color:var(--accent);margin-left:8px">${planetStr}</span>` : ''}
      <span class="house-theme">${HOUSE_THEMES[i]}</span>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderAspects(data) {
  if (data.aspects.length === 0) return '<h3>主要アスペクト</h3><p>主要なアスペクトは見つかりませんでした。</p>';
  let html = '<h3>主要アスペクト</h3>';
  for (const asp of data.aspects) {
    const p1 = PLANETS.find(p => p.id === asp.planet1);
    const p2 = PLANETS.find(p => p.id === asp.planet2);
    if (!p1 || !p2) continue;
    html += `<div class="aspect-row">
      <span>${p1.icon} ${p1.name}</span>
      <span class="aspect-type" style="color:${asp.color}">${asp.symbol} ${asp.type}</span>
      <span>${p2.icon} ${p2.name}</span>
      <span class="aspect-orb">orb ${asp.orb}°</span>
    </div>`;
  }
  return html;
}

function renderSummary(data) {
  const sunSign = getSign(data.positions.sun);
  const moonSign = getSign(data.positions.moon);
  const ascSign = getSign(data.asc);
  const sunData = SUN_IN_SIGN[sunSign.name] || { core: '' };

  // Element balance analysis
  const counts = { fire: 0, earth: 0, air: 0, water: 0 };
  for (const p of PLANETS) {
    counts[getSign(data.positions[p.id]).element]++;
  }
  const dominant = Object.entries(counts).sort((a,b) => b[1] - a[1])[0];
  const weak = Object.entries(counts).sort((a,b) => a[1] - b[1])[0];
  const elNames = { fire: '火（情熱・行動）', earth: '地（安定・現実）', air: '風（知性・交流）', water: '水（感情・直感）' };

  let summary = `<h3>あなたのホロスコープ概要</h3>`;
  summary += `<p>太陽は${sunSign.name}にあり、あなたの人生のテーマは「${sunData.core}」です。月は${moonSign.name}にあり、心の奥底では${moonSign.name}的な安らぎを求めています。上昇点（ASC）は${ascSign.name}で、周囲からは${ascSign.name}的な印象を持たれやすいでしょう。</p>`;
  summary += `<p>元素バランスを見ると、${elNames[dominant[0]]}の要素が${dominant[1]}天体と最も多く、あなたの基本的な行動パターンに強く影響しています。`;
  if (weak[1] === 0) {
    summary += `一方、${elNames[weak[0]]}の要素がゼロで、この領域は意識的に補う必要があるかもしれません。</p>`;
  } else {
    summary += `</p>`;
  }
  return summary;
}

function renderReadings(data) {
  let html = '';

  // Mercury, Venus, Mars readings
  for (const pid of ['mercury', 'venus', 'mars']) {
    const p = PLANETS.find(x => x.id === pid);
    const sign = getSign(data.positions[pid]);
    const readings = PLANET_IN_SIGN_SHORT[pid];
    const text = readings ? readings[sign.name] : '';
    if (!text) continue;

    const titles = { mercury: '思考とコミュニケーション', venus: '愛情と美意識', mars: '行動力とエネルギー' };
    html += `<div class="reading-section">
      <h3>${p.icon} ${p.name} in ${sign.name} — ${titles[pid]}</h3>
      <p>${text}。</p>
    </div>`;
  }

  // Outer planets (generational)
  const outerPlanets = ['jupiter','saturn','uranus','neptune','pluto'];
  const outerTitles = {
    jupiter: '幸運と拡大の方向',
    saturn: '試練と成長のテーマ',
    uranus: '変革と独自性（世代的テーマ）',
    neptune: '夢と理想（世代的テーマ）',
    pluto: '根本的変容（世代的テーマ）',
  };
  const outerDescs = {
    jupiter: '木星はあなたが自然と恵まれやすい領域を示します。',
    saturn: '土星はあなたが時間をかけて克服すべき課題を示します。乗り越えた先に最も確かな実力が身につきます。',
    uranus: '天王星は約7年で星座を移動するため、同世代に共通するテーマです。',
    neptune: '海王星は約14年で星座を移動し、世代の夢や理想の方向性を示します。',
    pluto: '冥王星は約12〜30年で星座を移動し、世代が経験する根本的な変容のテーマを示します。',
  };

  for (const pid of outerPlanets) {
    const p = PLANETS.find(x => x.id === pid);
    const sign = getSign(data.positions[pid]);
    const house = getHouse(data.positions[pid], data.houses);
    html += `<div class="reading-section">
      <h3>${p.icon} ${p.name} in ${sign.name}（${house}室）— ${outerTitles[pid]}</h3>
      <p>${outerDescs[pid]}${sign.name}の${house}室に位置しており、${HOUSE_THEMES[house - 1]}の領域で${sign.name}的なエネルギーが働いています。</p>
    </div>`;
  }

  // Aspect interpretation highlights
  const majorAspects = data.aspects.filter(a =>
    ['sun','moon','mercury','venus','mars'].includes(a.planet1) ||
    ['sun','moon','mercury','venus','mars'].includes(a.planet2)
  ).slice(0, 5);

  if (majorAspects.length > 0) {
    html += `<div class="reading-section"><h3>注目のアスペクト</h3>`;
    for (const asp of majorAspects) {
      const p1 = PLANETS.find(x => x.id === asp.planet1);
      const p2 = PLANETS.find(x => x.id === asp.planet2);
      const tension = (asp.angle === 90 || asp.angle === 180);
      const harmony = (asp.angle === 60 || asp.angle === 120);
      let interp = '';
      if (asp.angle === 0) interp = `${p1.name}と${p2.name}のエネルギーが融合し、互いを強め合っています。この2つの力が一体となって働くため、非常に強い影響力を持ちます。`;
      else if (harmony) interp = `${p1.name}と${p2.name}が調和的に結びついています。この2つの力が自然に協力し合い、才能として発揮されやすい配置です。`;
      else if (tension) interp = `${p1.name}と${p2.name}の間に緊張関係があります。葛藤を感じやすい配置ですが、この摩擦こそが成長の原動力になります。意識的に両方のエネルギーを活かすことで、大きな力に変わります。`;
      html += `<h4>${p1.icon}${p1.name} ${asp.symbol} ${p2.icon}${p2.name}（${asp.type}・orb ${asp.orb}°）</h4><p>${interp}</p>`;
    }
    html += `</div>`;
  }

  return html;
}

// ============================================================
// Main Entry Point
// ============================================================
function cast() {
  const dateStr = document.getElementById('birthdate').value;
  const timeStr = document.getElementById('birthtime').value;
  const sel = document.getElementById('birthplace');
  const [lat, lng] = sel.value.split(',').map(Number);
  const place = sel.options[sel.selectedIndex].text;

  if (!dateStr || !timeStr || isNaN(lat) || isNaN(lng)) {
    alert('生年月日と出生時刻を入力してください。');
    return;
  }

  const [year, month, day] = dateStr.split('-').map(Number);
  const [hour, minute] = timeStr.split(':').map(Number);

  const data = calculateChart(year, month, day, hour, minute, lat, lng);

  // Render
  document.getElementById('resultTitle').textContent = `${place ? place + '生まれ・' : ''}${year}年${month}月${day}日 ${hour}:${String(minute).padStart(2,'0')}`;
  document.getElementById('resultMeta').textContent = `${place} / 緯度 ${lat.toFixed(2)}° / 経度 ${lng.toFixed(2)}°`;

  document.getElementById('summaryCard').innerHTML = renderSummary(data);
  document.getElementById('threeCores').innerHTML = renderThreeCores(data);
  document.getElementById('chartSvg').innerHTML = renderChart(data);
  document.getElementById('planetList').innerHTML = renderPlanetList(data);
  document.getElementById('elementSection').innerHTML = renderElements(data);
  document.getElementById('houseSection').innerHTML = renderHouses(data);
  document.getElementById('aspectSection').innerHTML = renderAspects(data);
  document.getElementById('readings').innerHTML = renderReadings(data);

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
